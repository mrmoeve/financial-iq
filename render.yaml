services:
  - type: web
    name: statementiq
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements-prod.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: StatementIQ
      - key: ADMIN_EMAIL
        value: mrmoeve@gmail.com
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
