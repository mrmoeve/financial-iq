services:
  - type: web
    name: statementiq
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements-prod.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: StatementIQ
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: statementiq-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: statementiq-db
    databaseName: statementiq
    plan: basic-256mb
    region: oregon
